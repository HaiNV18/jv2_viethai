<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .movie-list {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
            gap: 20px;
        }

        .movie-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .movie-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 8px;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
        }

        .overview {
            color: #666;
            margin-top: 10px;
        }

        .rating {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Anime Movies</h1>

<div id="movies" class="movie-list"></div>

<script>

async function loadMovies() {

    const response =
        await fetch('/api/v1/movie/list');

    const movies = await response.json();

    const container =
        document.getElementById('movies');

    movies.forEach(movie => {

        container.innerHTML += `
            <div class="movie-card">

                <img src="/images/${movie.thumbnail}"
                     alt="${movie.title}">

                <div class="title">
                    <a href="detail.html?id=${movie.id}">
						${movie.title}
					</a>
                </div>

                <p>
                    Director:
                    ${movie.director}
                </p>

                <p>
                    Release:
                    ${movie.releaseDate}
                </p>

                <p class="rating">
                    ⭐ ${movie.voteAverage}
                    (${movie.voteCount} votes)
                </p>

                <div class="overview">
                    ${movie.overview}
                </div>

            </div>
        `;
    });

}

loadMovies();

</script>

</body>
</html>
