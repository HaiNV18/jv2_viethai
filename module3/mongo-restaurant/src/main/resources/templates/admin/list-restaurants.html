<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Tables - SB Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="/admin/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body class="sb-nav-fixed">
<nav class="sb-topnav navbar navbar-expand navbar-dark bg-dark">
    <!-- Navbar Brand-->
    <a class="navbar-brand ps-3" href="index.html">Start Bootstrap</a>
    <!-- Sidebar Toggle-->
    <button class="btn btn-link btn-sm order-1 order-lg-0 me-4 me-lg-0" id="sidebarToggle" href="#!"><i class="fas fa-bars"></i></button>
    <!-- Navbar Search-->
    <form class="d-none d-md-inline-block form-inline ms-auto me-0 me-md-3 my-2 my-md-0">
        <div class="input-group">
            <input class="form-control" type="text" placeholder="Search for..." aria-label="Search for..." aria-describedby="btnNavbarSearch" />
            <button class="btn btn-primary" id="btnNavbarSearch" type="button"><i class="fas fa-search"></i></button>
        </div>
    </form>
    <!-- Navbar-->
    <ul class="navbar-nav ms-auto ms-md-0 me-3 me-lg-4">
        <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false"><i class="fas fa-user fa-fw"></i></a>
            <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                <li><a class="dropdown-item" href="#!">Settings</a></li>
                <li><a class="dropdown-item" href="#!">Activity Log</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item" href="#!">Logout</a></li>
            </ul>
        </li>
    </ul>
</nav>
<div id="layoutSidenav">
    <!-- Side Navbar -->
    <div th:replace="admin/block/side-navbar :: sidenavbar"></div>

    <div id="layoutSidenav_content">
        <main>
            <div class="container-fluid px-4">
                <h1 class="mt-4">Tables</h1>
                <ol class="breadcrumb mb-4">
                    <li class="breadcrumb-item"><a href="index.html">Dashboard</a></li>
                    <li class="breadcrumb-item active">Tables</li>
                </ol>
                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/restaurant/list}" method="get" class="row g-3">
                            <div class="col-auto">
                                <input type="text" name="keyword" class="form-control" th:value="${keyword}" placeholder="Name">
                            </div>
                            <div class="col-auto">
                                <input type="text" name="borough" class="form-control" th:value="${borough}" placeholder="Borough">
                            </div>
                            <div class="col-auto">
                                <input type="text" name="cuisine" class="form-control" th:value="${cuisine}" placeholder="Cuisine">
                            </div>

                            <div class="col-auto">
                                <button type="submit" class="btn btn-primary">Search</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="fas fa-table me-1"></i>
                        DataTable Example
                    </div>
                    <div class="card-body">
                        <table class="table table-striped-columns">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Borough</th>
                                    <th>Cuisine</th>
                                    <th>Street</th>
                                </tr>
                            </thead>
                            <tfoot>
                                <tr>
                                    <th>ID</th>
                                    <th>Name</th>
                                    <th>Borough</th>
                                    <th>Cuisine</th>
                                    <th>Street</th>
                                </tr>
                            </tfoot>
                            <tbody>
                                <tr th:each="r : ${list}">
                                    <td>
                                        <a th:href="@{/restaurant/detail/{id}(id=${r.restaurantId})}">
                                            <span th:text="${r.restaurantId}"></span>
                                        </a>
                                    </td>
                                    <td th:text="${r.name}"></td>
                                    <td th:text="${r.borough}"></td>
                                    <td th:text="${r.cuisine}"></td>
                                    <td th:text="${r.address.street}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3">
                    <!-- Previous -->
                    <a th:if="${currentPage > 0}"
                       th:href="@{/restaurant/list(page=${currentPage - 1})}"
                       class="btn btn-primary btn-sm">Previous</a>

                    <!-- Page numbers -->
                    <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
                            <a th:href="@{/restaurant/list(page=${i})}"
                               th:text="${i + 1}"
                               th:classappend="${i == currentPage} ? 'btn btn-danger btn-sm' : 'btn btn-outline-primary btn-sm'">
                            </a>
                        </span>

                    <!-- Next -->
                    <a th:if="${currentPage < totalPages - 1}"
                       th:href="@{/restaurant/list(page=${currentPage + 1})}"
                       class="btn btn-primary btn-sm">Next</a>
                </div>

            </div>
        </main>
        <footer class="py-4 bg-light mt-auto">
            <div class="container-fluid px-4">
                <div class="d-flex align-items-center justify-content-between small">
                    <div class="text-muted">Copyright &copy; Your Website 2023</div>
                    <div>
                        <a href="#">Privacy Policy</a>
                        &middot;
                        <a href="#">Terms &amp; Conditions</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="/admin/js/scripts.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js" crossorigin="anonymous"></script>
</body>
</html>
