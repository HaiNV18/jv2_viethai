<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restaurant List</title>
    <style>
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }
        th {
            background: #f2f2f2;
        }
        .pagination a {
            margin: 0 5px;
            text-decoration: none;
        }
        .active {
            font-weight: bold;
            color: red;
        }
    </style>
</head>
<body>

<h2>Danh sách Restaurant</h2>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Borough</th>
        <th>Cuisine</th>
        <th>Street</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="r : ${list}">
        <td th:text="${r.restaurantId}"></td>
        <td th:text="${r.name}"></td>
        <td th:text="${r.borough}"></td>
        <td th:text="${r.cuisine}"></td>
        <td th:text="${r.address.street}"></td>
    </tr>
    </tbody>
</table>

<!-- Pagination -->
<div class="pagination">

    <!-- Previous -->
    <a th:if="${currentPage > 0}"
       th:href="@{/restaurants(page=${currentPage - 1})}">Previous</a>

    <!-- Page numbers -->
    <span th:each="i : ${#numbers.sequence(startPage, endPage)}">
        <a th:href="@{/restaurants(page=${i})}"
           th:text="${i + 1}"
           th:classappend="${i == currentPage} ? 'active' : ''"></a>
    </span>

    <!-- Next -->
    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/restaurants(page=${currentPage + 1})}">
        Next
    </a>

</div>

</body>
</html>
