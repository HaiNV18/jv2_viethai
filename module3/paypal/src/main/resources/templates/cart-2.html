<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>

    <!-- Paypal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=ATqkuWcRzCeoRQMHNu-Ja8wZWPamJQJr-Xsj_SZaoBnDR8EjjST0fsEgB8twCz9QA-ck5ZXL7KjqCx2r&currency=USD"></script>
</head>
<body>

<h1>Giỏ hàng</h1>

<table border="1">
    <tr>
        <th>Sản phẩm</th>
        <th>Giá</th>
        <th>SL</th>
        <th>Tổng</th>
    </tr>

    <tr>
        <td th:text="${productName}"></td>
        <td th:text="${price}"></td>
        <td th:text="${qty}"></td>
        <td th:text="${total}"></td>
    </tr>
</table>

<br>

<h2>
    Tổng thanh toán:
    $<span id="total" th:text="${total}"></span>
</h2>

<!-- Paypal Button -->
<div id="paypal-button-container"></div>

<script th:inline="javascript">
    let total = [[${total}]];

    paypal.Buttons({
        createOrder: function(data, actions) {
            return actions.order.create({
                purchase_units: [{
                    amount: {
                        value: total
                    }
                }]
            });
        },

        onApprove: function(data, actions) {
            return actions.order.capture().then(function(details) {
                alert('Thanh toán thành công: ' + details.payer.name.given_name);
            });
        }

    }).render('#paypal-button-container');

</script>

</body>
</html>
